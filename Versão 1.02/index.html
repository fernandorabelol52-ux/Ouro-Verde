<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Açougue Ouro Verde</title>
  <link rel="icon" type="image/png" href="logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style-v3.css" />
</head>
<body>

  <!-- ===== CABEÇALHO FIXO ===== -->
  <header class="header">
    <div class="header-inner">
      <div class="header-logo-group">
        <img src="logo.png" class="header-logo-img" alt="Açougue Ouro Verde"/>
        <div class="header-title">
          <span class="store-name">AÇOUGUE OURO VERDE</span>
          <span class="store-tagline">Carnes Frescas · Qualidade Garantida</span>
        </div>
      </div>
      <div class="header-right">
        <div class="header-clock" id="relogio"></div>
        <div class="status-badge" id="status-badge">
          <span class="status-dot"></span>
          <span id="status-text">Atualizando…</span>
        </div>
      </div>
    </div>
  </header>

  <!-- ===== SLIDES — gerados dinamicamente pelo app.js ===== -->
  <div class="slides-wrapper" id="slides-wrapper">
    <!-- Slides injetados por construirSlides() em app.js -->
  </div>

  <!-- ===== RODAPÉ FIXO ===== -->
  <footer class="footer">
    <p class="footer-text">Preços atualizados automaticamente · Consulte nossos atendentes</p>
    <div class="slide-dots" id="slide-dots"></div>
    <p class="footer-update" id="ultima-atualizacao">—</p>
  </footer>

  <!-- Elementos ocultos usados pelo carrossel de ofertas -->
  <div class="hidden-targets" aria-hidden="true">
    <ul id="lista-ofertas"></ul>
  </div>

  <script src="app.js"></script>
</body>
</html>
